<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - VelinStyle starter</title>
  <link rel="stylesheet" href="/src/main.css">
</head>
<body>
  <a href="#main" class="velin-skip-link">Skip to main</a>
  <header class="velin-nav" style="border-block-end:1px solid var(--velin-color-border)">
    <div class="velin-container velin-flex velin-flex--items-center" style="gap:1rem;flex-wrap:wrap;padding-block:0.5rem">
      <strong>VelinStyle starter</strong>
      <nav aria-label="Primary" class="velin-flex" style="gap:0.5rem;flex-wrap:wrap">
        <a href="index.html" class="velin-nav__link">Home</a>
        <a href="about.html" class="velin-nav__link">About</a>
        <a href="contact.html" class="velin-nav__link" aria-current="page">Contact</a>
      </nav>
      <velin-theme-toggle style="margin-inline-start:auto" target="html"></velin-theme-toggle>
    </div>
  </header>
  <main id="main" class="velin-container" style="padding-block:var(--velin-space-10);max-width:28rem">
    <h1 class="velin-text-4xl" style="font-weight:var(--velin-weight-semibold)">Contact</h1>
    <form class="velin-form--validated" novalidate style="margin-block-start:var(--velin-space-6)">
      <div class="velin-field">
        <label class="velin-label" for="m">Message</label>
        <textarea id="m" class="velin-textarea" required></textarea>
      </div>
      <button type="submit" class="velin-btn velin-btn--primary">Send</button>
    </form>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
