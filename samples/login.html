<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VelinStyle Sample</title>
  <link rel="stylesheet" href="../dist/velinstyle.css">
  <script type="module" src="../dist/velinstyle-components.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, var(--velin-color-primary-subtle) 0%, var(--velin-color-surface) 50%, var(--velin-color-secondary-subtle) 100%);
    }
    .login-card {
      inline-size: 100%;
      max-inline-size: 26rem;
      padding: var(--velin-space-8);
    }
    .login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--velin-space-3);
      margin-block-end: var(--velin-space-2);
      text-decoration: none;
      color: var(--velin-color-text);
    }
    .login-brand__icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      inline-size: 2.75rem;
      block-size: 2.75rem;
      border-radius: var(--velin-radius-lg);
      background: var(--velin-color-primary);
      color: var(--velin-color-on-primary);
    }
    .login-brand__text {
      font-size: var(--velin-text-2xl);
      font-weight: var(--velin-weight-extrabold);
      letter-spacing: var(--velin-tracking-tight);
    }
    .login-subtitle {
      text-align: center;
      color: var(--velin-color-text-muted);
      font-size: var(--velin-text-sm);
      margin-block-end: var(--velin-space-6);
    }
    .login-field {
      margin-block-end: var(--velin-space-4);
    }
    .login-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-block-end: var(--velin-space-6);
    }
    .login-link {
      font-size: var(--velin-text-sm);
      color: var(--velin-color-primary);
      text-decoration: none;
      font-weight: var(--velin-weight-medium);
    }
    .login-link:hover {
      text-decoration: underline;
    }
    .social-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--velin-space-2);
      flex: 1;
    }
    .social-btn svg {
      inline-size: 1.25rem;
      block-size: 1.25rem;
      flex-shrink: 0;
    }
    .login-footer {
      text-align: center;
      margin-block-start: var(--velin-space-6);
      font-size: var(--velin-text-sm);
      color: var(--velin-color-text-muted);
    }
    .password-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--velin-space-2);
      background: transparent;
      border: none;
      color: var(--velin-color-text-muted);
      cursor: pointer;
      border-radius: var(--velin-radius-sm);
      transition: var(--velin-transition-colors);
    }
    .password-toggle:hover {
      color: var(--velin-color-text);
      background: var(--velin-color-surface-dim);
    }
    .password-toggle svg {
      inline-size: 1.25rem;
      block-size: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="velin-layout-center">
    <div class="velin-card login-card">
      <div class="velin-card__body">

        <a href="#" class="login-brand" aria-label="VelinStyle Home">
          <span class="login-brand__icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 2 7 12 12 22 7 12 2"/>
              <polyline points="2 17 12 22 22 17"/>
              <polyline points="2 12 12 17 22 12"/>
            </svg>
          </span>
          <span class="login-brand__text">VelinStyle</span>
        </a>
        <p class="login-subtitle">Sign in to your account to continue</p>

        <form class="velin-form--validated" novalidate onsubmit="this.classList.add('was-validated'); event.preventDefault();">

          <div class="login-field">
            <div class="velin-input-group">
              <span class="velin-input-group__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="M22 7l-10 7L2 7"/>
                </svg>
              </span>
              <div class="velin-float-label" style="flex:1; min-inline-size:0;">
                <input type="email" class="velin-input" id="login-email" placeholder=" " required autocomplete="email"
                  style="border-start-start-radius:0; border-end-start-radius:0;">
                <label for="login-email" class="velin-label">Email address</label>
              </div>
            </div>
            <p class="velin-field-error" hidden>Please enter a valid email address.</p>
          </div>

          <div class="login-field">
            <div class="velin-input-group">
              <span class="velin-input-group__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
              </span>
              <div class="velin-float-label" style="flex:1; min-inline-size:0;">
                <input type="password" class="velin-input" id="login-password" placeholder=" " required minlength="8" autocomplete="current-password"
                  style="border-radius:0;">
                <label for="login-password" class="velin-label">Password</label>
              </div>
              <button type="button" class="password-toggle" aria-label="Show password" onclick="togglePassword(this)">
                <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                  <path d="M14.12 14.12a3 3 0 11-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <p class="velin-field-error" hidden>Password must be at least 8 characters.</p>
          </div>

          <div class="login-row">
            <label class="velin-switch velin-switch--sm">
              <input type="checkbox" class="velin-switch__input" id="remember-me">
              <span class="velin-switch__track"></span>
              <span class="velin-switch__label velin-text-sm">Remember me</span>
            </label>
            <a href="#" class="login-link">Forgot password?</a>
          </div>

          <button type="submit" class="velin-btn velin-btn--primary velin-btn--block velin-btn--lg">
            Sign in
          </button>
        </form>

        <div class="velin-divider velin-divider--text" role="separator" style="margin-block: var(--velin-space-6);">
          or continue with
        </div>

        <div class="velin-flex velin-flex--gap-3">
          <button type="button" class="velin-btn velin-btn--outline social-btn">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button type="button" class="velin-btn velin-btn--outline social-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            GitHub
          </button>
        </div>

        <p class="login-footer">
          Don't have an account? <a href="signup.html" class="login-link">Sign up</a>
        </p>

      </div>
    </div>
  </div>

  <script>
    function togglePassword(btn) {
      const group = btn.closest('.velin-input-group');
      const input = group.querySelector('input');
      const eyeIcon = btn.querySelector('.icon-eye');
      const eyeOffIcon = btn.querySelector('.icon-eye-off');

      if (input.type === 'password') {
        input.type = 'text';
        eyeIcon.style.display = 'none';
        eyeOffIcon.style.display = '';
        btn.setAttribute('aria-label', 'Hide password');
      } else {
        input.type = 'password';
        eyeIcon.style.display = '';
        eyeOffIcon.style.display = 'none';
        btn.setAttribute('aria-label', 'Show password');
      }
    }

    document.querySelector('.velin-form--validated').addEventListener('submit', function (e) {
      e.preventDefault();
      if (!this.checkValidity()) {
        this.querySelectorAll('.velin-field-error').forEach(el => {
          const field = el.previousElementSibling.querySelector('input');
          el.hidden = field && field.validity.valid;
        });
        return;
      }
      const btn = this.querySelector('[type="submit"]');
      btn.classList.add('velin-btn--loading');
      btn.disabled = true;
      setTimeout(() => {
        btn.classList.remove('velin-btn--loading');
        btn.disabled = false;
        alert('Login successful! (demo)');
      }, 1500);
    });
  </script>
</body>
</html>
