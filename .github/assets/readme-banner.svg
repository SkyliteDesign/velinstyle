<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="VelinStyle">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="45%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)" opacity="0.9"/>
  <circle cx="180" cy="80" r="120" fill="#6366f1" opacity="0.08" filter="url(#soft)"/>
  <circle cx="1020" cy="220" r="140" fill="#14b8a6" opacity="0.1" filter="url(#soft)"/>
  <rect x="48" y="48" width="4" height="204" rx="2" fill="url(#accent)"/>
  <text x="72" y="128" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="56" font-weight="700" fill="#0f172a" letter-spacing="-1.5">VelinStyle</text>
  <text x="72" y="172" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="500" fill="#475569">Accessibility-first CSS + Web Components</text>
  <text x="72" y="210" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15" fill="#64748b">OKLCH · WCAG AA · Container Queries · ~46 KB CSS</text>
  <g transform="translate(900, 108)">
    <rect x="0" y="0" width="88" height="36" rx="8" fill="#0f172a" opacity="0.06"/>
    <rect x="100" y="0" width="88" height="36" rx="8" fill="#6366f1" opacity="0.12"/>
    <rect x="200" y="0" width="88" height="36" rx="8" fill="#14b8a6" opacity="0.12"/>
    <text x="12" y="23" font-family="ui-monospace, monospace" font-size="12" fill="#334155">tokens</text>
    <text x="112" y="23" font-family="ui-monospace, monospace" font-size="12" fill="#4f46e5">a11y</text>
    <text x="212" y="23" font-family="ui-monospace, monospace" font-size="12" fill="#0d9488">themes</text>
    <rect x="0" y="52" width="288" height="8" rx="4" fill="url(#accent)" opacity="0.35"/>
    <rect x="0" y="52" width="192" height="8" rx="4" fill="url(#accent)"/>
  </g>
</svg>
