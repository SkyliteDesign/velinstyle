<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="VelinStyle">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="50%" stop-color="#12182a"/>
      <stop offset="100%" stop-color="#0d1a1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)" opacity="0.6"/>
  <circle cx="200" cy="90" r="130" fill="#6366f1" opacity="0.2" filter="url(#soft)"/>
  <circle cx="1000" cy="210" r="150" fill="#14b8a6" opacity="0.18" filter="url(#soft)"/>
  <rect x="48" y="48" width="4" height="204" rx="2" fill="url(#accent)"/>
  <text x="72" y="128" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="56" font-weight="700" fill="#f8fafc" letter-spacing="-1.5">VelinStyle</text>
  <text x="72" y="172" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="500" fill="#94a3b8">Accessibility-first CSS + Web Components</text>
  <text x="72" y="210" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15" fill="#64748b">OKLCH · WCAG AA · Container Queries · ~46 KB CSS</text>
  <g transform="translate(900, 108)">
    <rect x="0" y="0" width="88" height="36" rx="8" fill="#f8fafc" opacity="0.08"/>
    <rect x="100" y="0" width="88" height="36" rx="8" fill="#818cf8" opacity="0.2"/>
    <rect x="200" y="0" width="88" height="36" rx="8" fill="#2dd4bf" opacity="0.2"/>
    <text x="12" y="23" font-family="ui-monospace, monospace" font-size="12" fill="#cbd5e1">tokens</text>
    <text x="112" y="23" font-family="ui-monospace, monospace" font-size="12" fill="#a5b4fc">a11y</text>
    <text x="212" y="23" font-family="ui-monospace, monospace" font-size="12" fill="#5eead4">themes</text>
    <rect x="0" y="52" width="288" height="8" rx="4" fill="url(#accent)" opacity="0.35"/>
    <rect x="0" y="52" width="192" height="8" rx="4" fill="url(#accent)"/>
  </g>
</svg>
