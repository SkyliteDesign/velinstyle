# Publishes @birdapi/velinstyle to https://www.npmjs.com/ when you push a SemVer tag (e.g. v0.6.1).
# Requires repository secret: NPM_TOKEN — Granular token with publish on org "birdapi" (Packages: Read and write).

name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches Git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [[ "$TAG" != "$PKG" ]]; then
            echo "::error::Tag version v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing version $PKG from tag $GITHUB_REF_NAME"

      - name: Full build (dist/ for npm pack contents)
        run: npm run build

      - name: Require NPM_TOKEN secret
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::Repository secret NPM_TOKEN is not set. Add an npm automation token with publish access for @birdapi (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
