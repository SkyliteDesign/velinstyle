name: VelinStyle CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint CSS
        run: npm run lint

      - name: Full build
        run: npm run build

      - name: Validate design tokens
        run: npm run tokens:validate

      - name: Validate full tokens example
        run: npm run tokens:validate:full

      - name: Run unit tests
        run: npm test

      - name: Verify generated docs
        run: npm run docs:generate && git diff --exit-code docs/generated

      - name: CI gates (bundle, types, loaders, search index)
        run: node scripts/ci-checks.mjs

      - name: Run security tests
        run: npm run test:security

      - name: Run perf tests
        run: npm run test:perf

      - name: Perf audit on samples
        run: npx velinstyle perf audit samples/ --json

      - name: Run A11y tests
        run: npm run test:a11y

      - name: Run contrast tests
        run: npm run test:contrast

      - name: A11y coverage report
        run: npm run test:a11y:coverage

      - name: A11y HTML scanner
        run: npx velinstyle scan docs samples --only a11y --severity warning

      - name: Install Playwright browsers
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install Playwright browsers (Chromium only)
        if: runner.os != 'Linux'
        run: npx playwright install chromium

      - name: Cross-browser WC smoke (Playwright)
        if: runner.os == 'Linux'
        run: npm run test:e2e

      - name: WC smoke (Chromium)
        if: runner.os != 'Linux'
        run: npm run test:e2e:chromium

      - name: Check dist output exists
        run: node -e "const fs=require('node:fs'); const must=(p)=>{ if(!fs.existsSync(p)) { console.error('Missing: '+p); process.exit(1);} }; ['dist/velinstyle.css','dist/velinstyle.min.css','dist/velinstyle-components.js','dist/velinstyle-components.min.js','dist/velinstyle-components.iife.js','dist/velin-icons.svg','dist/velinstyle.d.ts','dist/chunks'].forEach(must);"
