name: VelinStyle CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint CSS
        run: npm run lint

      - name: Full build
        run: npm run build

      - name: Validate design tokens
        run: npm run tokens:validate

      - name: Validate full tokens example
        run: npm run tokens:validate:full

      - name: Run unit tests
        run: npm test

      - name: Verify generated docs
        run: npm run docs:generate && git diff --exit-code docs/generated

      - name: CI gates (bundle, types, loaders, search index)
        run: node scripts/ci-checks.mjs

      - name: Run security tests
        run: npm run test:security

      - name: Run perf tests
        run: npm run test:perf

      - name: Perf audit on samples
        run: npx velinstyle perf audit samples/ --json

      - name: Run A11y tests
        run: npm run test:a11y

      - name: Run contrast tests
        run: npm run test:contrast

      - name: A11y coverage report
        run: npm run test:a11y:coverage

      - name: A11y HTML scanner
        run: npx velinstyle scan docs samples --only a11y --severity warning

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Cross-browser WC smoke (Playwright)
        run: npm run test:e2e

      - name: Check dist output exists
        run: |
          test -f dist/velinstyle.css
          test -f dist/velinstyle.min.css
          test -f dist/velinstyle-components.js
          test -f dist/velinstyle-components.min.js
          test -f dist/velinstyle-components.iife.js
          test -f dist/velin-icons.svg
          test -f dist/velinstyle.d.ts
          test -d dist/chunks
