<!DOCTYPE html>
<html lang="en">
<head>

  <title>VelinStyle WC smoke</title>
  <link rel="stylesheet" href="/dist/velinstyle.min.css">
</head>
<body>
  <main id="main">
    <p velin-scroll-top="200"></p>
    <velin-copy value="smoke-test" label="Copy"></velin-copy>

    <velin-tooltip-wc content="Legacy">Legacy tip</velin-tooltip-wc>

  <script type="module">
    import { bootFromDOM } from '/components/runtime-entry.js';
    await bootFromDOM(document, { attributes: true });
  </script>

</html>
