<!-- VelinStyle blueprint: modal — pair with JS to toggle data-velin-open on overlay -->
<div class="velin-modal-overlay" data-velin-open role="presentation">
  <div class="velin-modal" role="dialog" aria-modal="true" aria-labelledby="bp-modal-title" aria-describedby="bp-modal-desc">
    <header class="velin-modal__header">
      <h2 class="velin-modal__title" id="bp-modal-title">Modal title</h2>
      <button type="button" class="velin-modal__close" aria-label="Close dialog">&times;</button>
    </header>
    <div class="velin-modal__body" id="bp-modal-desc">
      <p class="velin-text-muted">Remove data-velin-open to hide. Trap focus while open; see velin-dialog.js.</p>
    </div>
    <footer class="velin-modal__footer">
      <button type="button" class="velin-btn velin-btn--outline">Cancel</button>
      <button type="button" class="velin-btn velin-btn--primary">Confirm</button>
    </footer>
  </div>
</div>
