<!-- VelinStyle blueprint: search field with button -->
<form class="velin-container" role="search" style="max-width:28rem">
  <label class="velin-label" for="bp-search-q">Search</label>
  <div class="velin-flex velin-flex--gap-2" style="align-items:stretch">
    <input type="search" id="bp-search-q" class="velin-input" name="q" placeholder="Keywords…" autocomplete="off">
    <button type="submit" class="velin-btn velin-btn--primary">Search</button>
  </div>
</form>
