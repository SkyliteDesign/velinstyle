<!-- VelinStyle blueprint: dashboard shell — children order: header, aside, main -->
<div class="velin-layout-dashboard">
  <header style="padding:var(--velin-space-3);background:var(--velin-color-surface-bright);border-block-end:1px solid var(--velin-color-border);">
    <strong>App header</strong>
  </header>
  <aside style="padding:var(--velin-space-4);background:var(--velin-color-surface-dim);">
    <nav aria-label="Primary">Nav</nav>
  </aside>
  <main id="main" style="padding:var(--velin-space-6);background:var(--velin-color-surface-bright);">
    <h1 class="velin-text-xl" style="font-weight:var(--velin-weight-semibold)">Main</h1>
    <p class="velin-text-muted">Use skip link + landmark roles in real apps.</p>
  </main>
</div>
